<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Palette | Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merienda:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Linking my external CSS file so all my styling applies to this page -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<!-- skip link for accesibility so users can jump straight to main content without clicking through navigation -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

<!-- Header section with hero image and navigation -->
  <header class="menu-header">
    <!-- this overlay sits on top of the hero image to darken it slightly so text is easier to read -->
  <div class="hero-overlay"></div>

  <img src="images/food/heromenu.jpg" alt="Plant-based plated dish" class="menu-hero-image">
<!-- wrapper for everything that sits on top of the hero image nav, text, etc. -->
  <div class="menu-header-content">

<!-- Navigation section -->
    <nav class="menu-top-nav" aria-label="Main navigation">

      <!-- logo -->
       <!-- Clicking the logo brings the user back to the homepage -->
      <a class="site-logo" href="index.html">
        <img src="images/logo/logo.svg" alt="Plant Palette logo" class="logo-img">
      </a>

      <!-- hamburger -->
     <button
  class="menu-button"
  type="button"
  aria-label="Open navigation menu"
  aria-expanded="false"
  aria-controls="mobile-menu"
>
  <span class="menu-bar"></span>
  <span class="menu-bar"></span>
  <span class="menu-bar"></span>
</button>

      <!-- tablet nav -->
       <!-- tis section is specificaly for tablet/desktop navigation so users don’t need the hamburger menu -->
      <div class="tablet-nav">
          <!-- Each link takes the user to a different page on the site -->
        <a class="tablet-nav-link" href="index.html">Home</a>
        <a class="tablet-nav-link active" href="menu.html">Menu</a>
        <a class="tablet-nav-link" href="contact.html">Contact Us</a>
      </div>

    </nav>

    <!-- mobile menu -->
     <!-- This is the menu that shows up when the hamburger button is clicked -->
    <div class="mobile-nav-links" id="mobile-menu">
      <!-- ths box hods the actual menu content so I can style it like a panel instead of full screen -->
      <div class="mobile-menu-box">
       <button class="close-menu" type="button" aria-label="Close navigation menu">✕</button>

        <a class="mobile-nav-link" href="index.html">Home</a>
        <a class="mobile-nav-link active" href="menu.html">Menu</a>
        <a class="mobile-nav-link" href="contact.html">Contact Us</a>
      </div>
    </div>
    
    <!-- Hero text section with structured data for SEO (basically telling search engines this is a restaurant) -->
     <div class="hero-text-wrap" itemscope itemtype="https://schema.org/Restaurant">

      <!-- Main Content  -->
  <h1 class="menu-title" itemprop="name">· Our Menu ·</h1>
  <p class="menu-subtitle" itemprop="description">
    Seasonal plant-based dishes made with locally sourced ingredients.
  </p>
</div>

  </div>
</header>

  <!-- Adding role="main" and schema markup to improve accessibility and help search engines understand this is a menu -->
  <main id="main-content" role="main" itemscope itemtype="https://schema.org/Menu">
     <!-- Section for organizing the menu into categories -->
    <section class="category-section">
      <!-- Wrapper to keep everything aligned nicely and not too stretched on big screens -->
      <div class="page-wrapper">
        <h2 class="category-title">Category</h2>

         <!-- First row of categories -->
        <!-- Using rows so I can control layout better (like 2 items per row) -->
        <div class="category-row">
          <article class="category-item">
            <h3 class="category-name">Starters</h3>
            <img src="images/food/starter.jpg" alt="Starter dish" class="category-image">
          </article>

          <article class="category-item">
            <h3 class="category-name">Mains</h3>
            <img src="images/food/main.jpg" alt="Main dish" class="category-image">
          </article>
        </div>

        <!-- secnd row of categores -->
        <div class="category-row">
          <article class="category-item">
            <h3 class="category-name">Desserts</h3>
            <img src="images/food/dessert.jpg" alt="Dessert dish" class="category-image">
          </article>

          <article class="category-item">
            <h3 class="category-name">Drinks</h3>
            <!-- keping alt text simple but desccxriptve so screen readers understand the image -->
            <img src="images/food/drink.jpg" alt="Drink" class="category-image">
          </article>
        </div>
