
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Palette | Contact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merienda:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">


</head>
<body>
  <!-- Skip link for accessibility so users can jump straight to the main content -->
  <a class="skip-link" href="#main-content">Skip to main content</a>
  
  <!-- Header section -->
 <header class="contact-header">
  <!-- Navigation bar -->
  <nav class="contact-top-nav" aria-label="Main navigation">

    <!-- logo -->
    <a class="site-logo" href="index.html">
      <img src="images/logo/logo.svg" alt="Plant Palette logo" class="logo-img">
    </a>

    <!-- hamburger -->
    <button
  class="menu-button"
  type="button"
  aria-label="Open navigation menu"
  aria-expanded="false"
  aria-controls="mobile-menu"
>
  <span class="menu-bar"></span>
  <span class="menu-bar"></span>
  <span class="menu-bar"></span>
</button>

    <!-- tablet nav -->
       <!-- this nav shows on larger screens so users don’t need the hamburger -->
    <div class="tablet-nav">
      <a class="tablet-nav-link" href="index.html">Home</a>
      <a class="tablet-nav-link" href="menu.html">Menu</a>
      <a class="tablet-nav-link active" href="contact.html">Contact Us</a>
    </div>

  </nav>

  <!-- mobile menu -->
  <!-- This appears when the hamburger menu is clicked -->
  <div id="mobile-menu" class="mobile-nav-links">
    <div class="mobile-menu-box">
      <button class="close-menu" type="button" aria-label="Close navigation menu">✕</button>

       <!-- Same links as the main navigation but styled for mobile -->
      <a class="mobile-nav-link" href="index.html">Home</a>
      <a class="mobile-nav-link" href="menu.html">Menu</a>
      <a class="mobile-nav-link active" href="contact.html">Contact Us</a>
    </div>
  </div>

</header>
