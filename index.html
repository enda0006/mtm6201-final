<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- making sure the layout doesn’t break on phones (without this everything looks zoomed out) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Palette | Home</title>
   <!-- bringing in my font so the site looks like my design -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merienda:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- this is mainly for accessibility, lets keyboard users skip straight to content -->
  <a class="skip-link" href="#main-content">Skip to main content</a>


  <header class="site-header">
    <!-- navigation bar -->
    <nav class="site-nav" aria-label="Main navigation">
      <!-- logo doubles as a home button so users can always get back -->
      <a class="site-logo" href="index.html">
        <img src="images/logo/logo.svg" alt="Plant Palette logo" class="logo-img">
      </a>
      <!-- hamburger menu (only really used on mobile) -->
      <button class="menu-button" type="button" aria-label="Open navigation menu" aria-expanded="false">
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
      </button>
    </nav>

    <!-- this is the full-screen overlay that appears when the menu opens -->
   <div class="mobile-nav-links">
    <!-- this is the actual white box inside the overlay -->
  <div class="mobile-menu-box">
    <!-- X button to close menu -->
    <button class="close-menu" aria-label="Close menu">✕</button>

    <!-- nav links -->
    <a class="mobile-nav-link active" href="index.html">Home</a>
    <a class="mobile-nav-link" href="menu.html">Menu</a>
    <a class="mobile-nav-link" href="contact.html">Contact Us</a>
  </div>
</div>
  </header>
  
  <!-- main content of the page -->
  <main id="main-content">

 <!-- HERO -->
    <section class="hero-section">
      <div class="page-wrapper">
        <h1 class="hero-title">Plant-Based Dining, Made With Care</h1>

        <p class="hero-text">
          Seasonal vegan meals crafted with ethically sourced ingredients.
        </p>

        <img
          src="images/food/hero.jpg"
          alt="A table set with plant-based dishes and drinks"
          class="hero-image"
        >

        <!-- call to action button -->
        <div class="button-wrap">
          <a href="contact.html" class="primary-button book-button">Book A Table</a>
        </div>
      </div>
    </section>
